<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Clicker</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#111;
    color:white;
    margin-top:50px;
}

button{
    padding:12px 24px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

#target{
    width:200px;
    height:100px;
    font-size:24px;
}

#counter{
    font-size:30px;
    color:#00ff88;
}
</style>
</head>
<body>

<h1>Auto Clicker</h1>

<button id="target">Click Me</button>

<h2>Clicks: <span id="counter">0</span></h2>

<p>
Clicks Per Second:
<input type="number" id="cps" value="10" min="1" max="1000">
</p>

<button id="start">Start Auto Clicker</button>
<button id="stop">Stop Auto Clicker</button>

<script>
let clicks = 0;
let autoClicker = null;

const target = document.getElementById("target");
const counter = document.getElementById("counter");

target.addEventListener("click", () => {
    clicks++;
    counter.textContent = clicks;
});

document.getElementById("start").addEventListener("click", () => {
    const cps = parseInt(document.getElementById("cps").value);

    if(autoClicker) clearInterval(autoClicker);

    autoClicker = setInterval(() => {
        target.click();
    }, 1000 / cps);
});

document.getElementById("stop").addEventListener("click", () => {
    clearInterval(autoClicker);
    autoClicker = null;
});
</script>

</body>
</html>
